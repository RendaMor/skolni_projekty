<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <title>Průměr čísel</title>
</head>
<body>
    <script>
        function prumerPrvku(cisla) {
          let soucet = 0;
          for (let cislo of cisla) {
            soucet += cislo;
          }
          return soucet / cisla.length;
        }

        let cisla = [15, 8, 12, 16, 4, 1, 5, 14];

        document.write("Pole čísel:");
        document.write("<ul>");
        for (let cislo of cisla) {
          document.write("<li>" + cislo + "</li>");
        }
        document.write("</ul>");
        document.write("Průměr všech čísel v poli: " + prumerPrvku(cisla));
    </script>
</body>
</html>
