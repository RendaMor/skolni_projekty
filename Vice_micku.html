<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vice micku</title>
    <style>
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .ball {
            position: absolute;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id = "container"></div>
<script>
    const container = document.getElementById("container");
    const numBalls = 50;
    const gravity = 0.5;
    const bounce = 0.8;

    const balls = [];

    function random(min, max) {
        return Math.random() * (max - min) + min;
    }

    function createBall() {
        const size = random(20, 60);
        const ball = document.createElement("div");
        ball.className = "ball";
        ball.style.width = size + "px";
        ball.style.height = size + "px";

        const r = Math.floor(random(50, 255));
        const g = Math.floor(random(50, 255));
        const b = Math.floor(random(50, 255));
        ball.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;

        container.appendChild(ball);

        return {
            el: ball,
            x: random(0, window.innerWidth - size),
            y: random(0, window.innerHeight / 2),
            vy: random(-5, 5),
            vx: random(-3, 3),
            size: size
        }
    }

    for (let i = 0; i < numBalls; i++) {
        balls.push(createBall());
    }

    function animate() {
        const width = window.innerWidth;
        const height = window.innerHeight;

        balls.forEach(ball => {
            ball.vy += gravity;
            ball.x += ball.vx;
            ball.y += ball.vy;

            const floor = height - ball.size;
            const right = width - ball.size;

            if (ball.y > floor) {
                ball.y = floor;
                ball.vy *= -bounce;
            }
            if (ball.x < 0) {
                ball.x = 0;
                ball.vx *= -bounce;
            }

            ball.el.style.transform = `translate(${ball.x}px, ${ball.y}px)`;
        });

        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
</html>
