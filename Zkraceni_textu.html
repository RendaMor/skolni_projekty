<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zkrácení textu</title>
</head>
<body>
  <h1>Zkrácení textu</h1>

  <script>
    function shortenText(text, length) {
      return text.length > length ? text.slice(0, length) + "..." : text;
    }

    let originalText = prompt("Zadejte text:");
    let maxLength = +prompt("Zadejte délku:");

    let shortened = shortenText(originalText, maxLength);

    document.write("<strong>Původní text:</strong> " + originalText + "<br>");
    document.write("<strong>Zkrácený text:</strong> " + shortened);
  </script>
</body>
</html>
