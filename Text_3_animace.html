<!DOCTYPE html>
<html lang="cs-cz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styly.css" rel="stylesheet">
    <title>Document</title>
    <style>
        .animace1 {
            background-color: aqua;
            animation: velikost 3s infinite;
            text-align: center;

        }

        @keyframes velikost {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(2);
            }
        }

        .animace2 {
            animation: pohyb 10s infinite;
        }

        @keyframes pohyb {
            from {
                margin-left: 0px;
            }

            50% {
                margin-left: 80px;
            }

            to {
                margin-left: 100px;
            }
        }

        .animace3 {
            animation: zastaveni 6s infinite;
        }

        @keyframes zastaveni {
            0% {
                margin-left: 0px;
            }

            25%,
            75% {
                margin-left: 50px;
            }

            100% {
                margin-left: 100px;
            }
        }
    </style>
</head>

<body>
    <div class="animace1">Změna velikosti</div>
    <br>
    <br>
    <div class="animace2">Pohyb</div>
    <br>
    <br>
    <div class="animace3">Zastavení animace</div>
</body>

</html>
